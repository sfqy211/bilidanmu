name: publish-tauri

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src-tauri/tauri.conf.json'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if version tag exists
        id: check
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "app-v$VERSION" >/dev/null 2>&1; then
            echo "Tag app-v$VERSION already exists, skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VERSION detected"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  changelog:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$LATEST_TAG..HEAD"
          fi

          FEAT=$(git log --pretty=format:"%s" "$RANGE" | grep -E "^feat" | sed 's/^feat: */- /; s/^feat(\([^)]*\)): */- [\1] /' || true)
          FIX=$(git log --pretty=format:"%s" "$RANGE" | grep -E "^fix" | sed 's/^fix: */- /; s/^fix(\([^)]*\)): */- [\1] /' || true)
          REFACTOR=$(git log --pretty=format:"%s" "$RANGE" | grep -E "^refactor" | sed 's/^refactor: */- /; s/^refactor(\([^)]*\)): */- [\1] /' || true)
          OTHER=$(git log --pretty=format:"%s" "$RANGE" | grep -vE "^(feat|fix|refactor)" | sed 's/^/- /' || true)

          BODY=""
          if [ -n "$FEAT" ]; then BODY="$BODY## вңЁ ж–°еҠҹиғҪ"$'\n'"$FEAT"$'\n\n'; fi
          if [ -n "$FIX" ]; then BODY="$BODY## рҹҗӣ дҝ®еӨҚ"$'\n'"$FIX"$'\n\n'; fi
          if [ -n "$REFACTOR" ]; then BODY="$BODY## вҷ»пёҸ йҮҚжһ„"$'\n'"$REFACTOR"$'\n\n'; fi
          if [ -n "$OTHER" ]; then BODY="$BODY## рҹ“Ұ е…¶д»–"$'\n'"$OTHER"$'\n\n'; fi

          if [ -z "$BODY" ]; then BODY="- еҲқе§ӢзүҲжң¬"; fi

          EOF=$(uuidgen)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

  publish:
    needs: [check, changelog]
    if: needs.check.outputs.should_build == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default build (with STT)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            variant: default
          # Lite build (without STT вҖ” smaller binary, lower memory)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            variant: lite

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}-${{ matrix.variant }}

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Rust check
        run: cargo check ${{ matrix.variant == 'lite' && '--no-default-features' || '' }}
        working-directory: src-tauri

      - name: Rename product for lite build
        if: matrix.variant == 'lite'
        shell: bash
        run: |
          sed -i 's/"productName": "BiliDanmu"/"productName": "BiliDanmu-Lite"/' src-tauri/tauri.conf.json

      - name: Build and publish Tauri app (default)
        if: matrix.variant == 'default'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'BiliDanmu v__VERSION__'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Build and publish Tauri app (lite)
        if: matrix.variant == 'lite'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'BiliDanmu v__VERSION__'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} -- --no-default-features
